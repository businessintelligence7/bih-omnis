name: OMNIS Weekly Market Intelligence Brief
on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:
jobs:
  generate-brief:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install feedparser anthropic --break-system-packages
      - run: python scripts/market_intelligence_brief.py
