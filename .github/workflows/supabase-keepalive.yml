name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */5 * *'   # Every 5 days at 8am UTC (4am Jamaica time)
  workflow_dispatch:          # Manual trigger from GitHub UI anytime

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase — OMNIS
        run: |
          RESPONSE=$(curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://ipbwrnawhnnjjdnmlvaq.supabase.co/rest/v1/keepalive?select=ping")
          echo "Response: $RESPONSE"
          if [[ "$RESPONSE" == *"ping"* ]]; then
            echo "✅ Supabase is alive"
          else
            echo "❌ Unexpected response — check manually"
            exit 1
          fi
```

Scroll down → **Commit new file** → commit directly to `main`.

