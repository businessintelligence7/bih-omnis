## Step 4 — Test It Manually Right Now

Don't wait 5 days. Go to:

**Actions** tab → **Supabase Keep-Alive** (left sidebar) → **Run workflow** → **Run workflow**

Watch it run. You should see a green tick and the log showing:
```
Response: [{"ping":1}]
✅ Supabase is alive
```

If it goes green, keep-alive is done. ✅

