name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    env:
      ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            -H "apikey: ${ANON_KEY}" \
            -H "Authorization: Bearer ${ANON_KEY}" \
            "https://ipbwrnawhnnjjdnmlvaq.supabase.co/rest/v1/keepalive?select=ping"
          echo "Supabase is alive"
